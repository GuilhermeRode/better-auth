name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes automatizados
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Executar testes
        run: npm run test
        env:
          BETTER_AUTH_SECRET: "ci-test-secret-longo-o-suficiente-para-funcionar"
          NEXT_PUBLIC_APP_URL: "http://localhost:3001"
          GITHUB_CLIENT_ID: "ci-placeholder"
          GITHUB_CLIENT_SECRET: "ci-placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/better_auth_showcase"

      - name: TypeScript check
        run: npx tsc --noEmit