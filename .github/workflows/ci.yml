name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Testes automatizados
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: better_auth_showcase
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Instalar dependências
        run: npm install --legacy-peer-deps

      - name: Aplicar schema no banco
        run: npx drizzle-kit push
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/better_auth_showcase"

      - name: Executar testes
        run: npm run test
        env:
          BETTER_AUTH_SECRET: "ci-test-secret-longo-o-suficiente-para-funcionar"
          BETTER_AUTH_URL: "http://localhost:3001"
          NEXT_PUBLIC_APP_URL: "http://localhost:3001"
          AUTH_GITHUB_CLIENT_ID: "ci-placeholder"
          AUTH_GITHUB_CLIENT_SECRET: "ci-placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/better_auth_showcase"

      - name: TypeScript check
        run: npx tsc --noEmit